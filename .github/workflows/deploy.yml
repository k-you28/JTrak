name: CD Deploy

on:
  workflow_run:
    workflows: ["CI Test"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: cd-deploy-main
  cancel-in-progress: true

jobs:
  publish-and-deploy:
    name: Publish Image and Optional Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    steps:
      - name: Checkout (workflow_run SHA)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_PAT,IMAGE
          script: |
            echo "$GHCR_PAT" | docker login ghcr.io -u github-actions --password-stdin
            docker pull "$IMAGE:latest"
            docker stop job-tracker || true
            docker rm   job-tracker || true
            docker run -d \
              --name job-tracker \
              --restart unless-stopped \
              -p 8081:8081 \
              --env-file /home/ubuntu/.env \
              "$IMAGE:latest"
            docker image prune -f
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE: ghcr.io/${{ github.repository }}
