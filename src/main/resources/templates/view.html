<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>View Application - Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <!-- Apply saved theme before first paint to prevent flash -->
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>
  <main class="page-shell" style="max-width: 720px;">

    <nav class="breadcrumb">
      <a href="/">← Dashboard</a>
      <span class="breadcrumb-sep">/</span>
      <span>Application Details</span>
    </nav>

    <section class="hero">
      <div>
        <h1 th:text="${jobApplication != null ? jobApplication.positionTitle : 'Application Details'}">Application Details</h1>
        <p th:if="${jobApplication != null}" th:text="${jobApplication.companyName}">Company</p>
        <p th:if="${jobApplication == null}">Everything logged for this role in one place.</p>
      </div>
    </section>

    <p th:if="${error}" class="notice error" th:text="${error}">Error</p>

    <section class="panel panel-content" th:if="${jobApplication}">
      <dl class="detail-grid">
        <dt>Company</dt>
        <dd th:text="${jobApplication.companyName} ?: '—'">—</dd>

        <dt>Position</dt>
        <dd th:text="${jobApplication.positionTitle} ?: '—'">—</dd>

        <dt>Date Applied</dt>
        <dd th:text="${jobApplication.dateApplied} ?: '—'">—</dd>

        <dt>Status</dt>
        <dd>
          <form th:action="@{/update-status/{id}(id=${jobApplication.id})}" method="post" class="status-form">
            <input type="hidden" name="redirectTo" th:value="@{/view/{id}(id=${jobApplication.id})}"/>
            <select name="status"
                    class="status-select"
                    th:classappend="' status-' + ${#strings.toLowerCase(jobApplication.status ?: 'applied')}"
                    onchange="this.className='status-select status-'+this.value.toLowerCase(); this.form.submit()">
              <option value="APPLIED"       th:selected="${jobApplication.status == 'APPLIED'}">Applied</option>
              <option value="INTERVIEWING"  th:selected="${jobApplication.status == 'INTERVIEWING'}">Interviewing</option>
              <option value="OFFER"         th:selected="${jobApplication.status == 'OFFER'}">Offer</option>
              <option value="REJECTED"      th:selected="${jobApplication.status == 'REJECTED'}">Rejected</option>
            </select>
          </form>
        </dd>

        <dt>Source</dt>
        <dd th:text="${jobApplication.source} ?: '—'">—</dd>

        <dt>Notes</dt>
        <dd th:text="${jobApplication.notes} ?: '—'">—</dd>

        <dt>Request Key</dt>
        <dd th:text="${jobApplication.requestKey} ?: '—'">—</dd>
      </dl>
    </section>

    <div class="toolbar" style="margin-top: 1rem;">
      <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
    </div>
  </main>
</body>
</html>
