# ─────────────────────────────────────────────────────────────────────────────
# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
# Required Railway env vars (no defaults): SPRING_DATASOURCE_URL,
#   SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────

# PostgreSQL — set SPRING_DATASOURCE_URL=jdbc:postgresql://<host>/<db> on Railway
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — keep pool small; Railway free Postgres allows ~25 connections total
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
# Suppress open-in-view warning — lazy loading during view rendering is acceptable here
spring.jpa.open-in-view=false
# Flyway owns the schema; Hibernate validation is redundant and brittle against
# minor type representation differences (e.g. TIMESTAMPTZ vs TIMESTAMP) in prod.
spring.jpa.hibernate.ddl-auto=none

# Disable H2 — not used in production
spring.h2.console.enabled=false

# Actuator: health details visible to internal/infra probes only
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ACTUATOR_ADMIN

# Logging — reduce noise, keep app-level INFO
logging.level.root=WARN
logging.level.com.kevin=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# Use PORT env var if Railway overrides the default
server.port=${PORT:8081}

# Graceful shutdown: drain in-flight requests before the process exits
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Session cookies: Secure (HTTPS only), HttpOnly, SameSite=Strict
# Railway terminates TLS at its edge; the app itself speaks plain HTTP behind it.
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

