# ─────────────────────────────────────────────────────────────────────────────
# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
# All values without defaults MUST be set as environment variables on Railway.
# ─────────────────────────────────────────────────────────────────────────────

# PostgreSQL — set SPRING_DATASOURCE_URL=jdbc:postgresql://<host>/<db> on Railway
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
# Flyway owns the schema; Hibernate validation is redundant and brittle against
# minor type representation differences (e.g. TIMESTAMPTZ vs TIMESTAMP) in prod.
spring.jpa.hibernate.ddl-auto=none

# Disable H2 — not used in production
spring.h2.console.enabled=false

# Actuator: health details visible to internal/infra probes only
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ACTUATOR_ADMIN

# Logging — reduce noise, keep app-level INFO
logging.level.root=WARN
logging.level.com.kevin=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# Use PORT env var if Railway overrides the default
server.port=${PORT:8081}
