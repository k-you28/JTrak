<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register - Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div>
        <h1>Create Account</h1>
        <p>Register with your email to start tracking applications securely.</p>
      </div>
    </section>

    <p th:if="${error}" class="notice error" th:text="${error}">Error</p>

    <section class="panel">
      <form method="post" th:action="@{/register}" th:object="${registration}" class="form-grid">
        <div>
          <label>Email</label>
          <input type="email" th:field="*{email}" required/>
        </div>

        <div>
          <label>Password</label>
          <input type="password" th:field="*{password}" required minlength="8"/>
        </div>

        <div>
          <label>Confirm Password</label>
          <input type="password" th:field="*{confirmPassword}" required minlength="8"/>
        </div>

        <div class="form-actions">
          <button type="submit">Create Account</button>
          <a href="/login" class="btn btn-secondary">Back To Login</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
