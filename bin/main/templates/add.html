<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Add Application - Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
  <main class="page-shell" style="max-width: 720px;">

    <nav class="breadcrumb">
      <a href="/">← Dashboard</a>
      <span class="breadcrumb-sep">/</span>
      <span>Add Application</span>
    </nav>

    <section class="hero">
      <div>
        <h1>Add Job Application</h1>
        <p>Capture the essentials now so follow-ups are easier later.</p>
      </div>
    </section>

    <p th:if="${error}" class="notice error" th:text="${error}">Error</p>

    <section class="panel panel-content">
      <form method="post" th:action="@{/add}" th:object="${application}" class="form-grid">

        <!-- Company and position side by side -->
        <div class="form-row">
          <div>
            <label>Company Name *</label>
            <input type="text" th:field="*{companyName}" placeholder="Acme Corp" required/>
          </div>
          <div>
            <label>Position Title *</label>
            <input type="text" th:field="*{positionTitle}" placeholder="Software Engineer" required/>
          </div>
        </div>

        <!-- Date and status side by side -->
        <div class="form-row">
          <div>
            <label>Date Applied *</label>
            <input type="date" th:field="*{dateApplied}" required/>
          </div>
          <div>
            <label>Status</label>
            <select th:field="*{status}">
              <option value="APPLIED">Applied</option>
              <option value="INTERVIEWING">Interviewing</option>
              <option value="OFFER">Offer</option>
              <option value="REJECTED">Rejected</option>
            </select>
          </div>
        </div>

        <div>
          <label>Source</label>
          <input type="text" th:field="*{source}" placeholder="LinkedIn, Referral, Company Site"/>
        </div>

        <div>
          <label>Notes</label>
          <textarea th:field="*{notes}" rows="4" placeholder="Recruiter name, next steps, salary range, timeline..."></textarea>
        </div>

        <div class="form-actions">
          <button type="submit">Save Application</button>
          <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </section>
  </main>
  <script>
    function parseResume() {
      var file = document.getElementById('resumeFile').files[0];
      if (!file) {
        setResumeStatus('error', 'Please select a file first.');
        return;
      }
      var btn = document.getElementById('parseResumeBtn');
      btn.disabled = true;
      btn.textContent = 'Analyzing...';
      setResumeStatus('', 'Analyzing your resume with AI — this may take a few seconds...');

      var formData = new FormData();
      formData.append('resume', file);

      fetch('/api/resume/parse', { method: 'POST', body: formData })
        .then(function(r) {
          if (!r.ok) return r.json().then(function(e) { throw new Error(e.message || 'Parse failed'); });
          return r.json();
        })
        .then(function(data) {
          prefillForm(data);
          setResumeStatus('success', 'Fields pre-filled from your resume. Review everything before saving.');
        })
        .catch(function(err) {
          setResumeStatus('error', 'Could not parse resume: ' + err.message);
        })
        .finally(function() {
          btn.disabled = false;
          btn.textContent = 'Parse Resume';
        });
    }

    function prefillForm(data) {
      // Only fill fields that are currently empty so the user's own input is never overwritten
      var posEl = document.querySelector('[name="positionTitle"]');
      var notesEl = document.querySelector('[name="notes"]');
      var dateEl = document.querySelector('[name="dateApplied"]');
      if (posEl && !posEl.value && data.targetTitle) posEl.value = data.targetTitle;
      if (notesEl && !notesEl.value && data.notes) notesEl.value = data.notes;
      if (dateEl && !dateEl.value) dateEl.value = new Date().toISOString().split('T')[0];
    }

    function setResumeStatus(type, message) {
      var el = document.getElementById('resumeStatus');
      el.style.display = 'block';
      el.className = 'notice' + (type ? ' ' + type : '');
      el.textContent = message;
    }
  </script>
</body>
</html>
