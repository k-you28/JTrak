spring.application.name=job-application-tracker
spring.config.import=optional:file:./config/secrets.properties

# Anthropic Claude API (for resume parsing)
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.api-url=https://api.anthropic.com/v1/messages
anthropic.model=claude-haiku-4-5-20251001

# Multipart upload limits (for resume files)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# H2 (default for local)
# Allow reconnect from repeated local runs and keep a stable on-disk file.
spring.datasource.url=jdbc:h2:file:./data/jobtracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Optional: H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8081

# Base URL used when composing email verification links.
app.verification.base-url=http://localhost:8081
# Number of days without a status update before an application appears in Needs Attention
app.followup.stale-days=5
app.ownership.legacy-email=legacy-api@jobtracker.local
# BCrypt hash for the internal legacy API account. This account is never used for interactive login.
# Override via secrets.properties or environment variable if needed.
app.ownership.legacy-password-hash=$2a$10$7EqJtq98hPqEX7fNZaFWoO6P6QF6UVx/FuWRzE7dOjIvmhjYQdkf.

# Email delivery mode:
# - log  : prints verification links to application logs (default for local dev)
# - smtp : sends real emails using spring.mail.* settings below
app.email.provider=smtp
app.email.from=no-reply@jobtracker.local

# SMTP config (used when app.email.provider=smtp)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}

# External market analytics polling
app.market.enabled=true
app.market.query=software
app.market.where=
app.market.sort-by=relevance
app.market.distance=
app.market.salary-min=
app.market.salary-max=
app.market.full-time=
app.market.max-days-old=
app.market.page-start=1
app.market.page-size=100
# 15 minutes default (safer for 3rd-party API rate limits)
app.market.poll-interval-ms=900000

# Adzuna API credentials/shared endpoint for market + skills
app.adzuna.base-url=https://api.adzuna.com/v1/api/jobs/us/search
app.adzuna.app-id=${ADZUNA_APP_ID:}
app.adzuna.app-key=${ADZUNA_APP_KEY:}

# Hacker News sidebar (startup + every 5 minutes)
app.news.enabled=true
app.news.top-stories-url=https://hacker-news.firebaseio.com/v0/topstories.json
app.news.item-url-prefix=https://hacker-news.firebaseio.com/v0/item/
app.news.top-limit=5
app.news.poll-interval-ms=300000

# Skills demand analytics (startup + every 15 minutes)
# Note: query, pages, results-per-page, sort-by are hardcoded in SkillDemandAnalyticsService
app.skills.enabled=true
app.skills.redirect-delay-ms=0
app.skills.dedupe-mode=id
app.skills.top-n=8
app.skills.poll-interval-ms=900000
# Core languages
# Cloud & infrastructure
# AI/ML
# Security
# Data engineering
# Frontend & mobile
# Practices & tools
app.skills.dictionary=\
  java,python,javascript,typescript,go,rust,scala,kotlin,swift,ruby,php,bash,c++,\
  react,angular,vue,spring,django,flask,next.js,flutter,react native,\
  docker,kubernetes,aws,azure,gcp,terraform,ansible,jenkins,linux,nginx,\
  sql,postgresql,mongodb,redis,elasticsearch,kafka,spark,airflow,dbt,snowflake,hadoop,rabbitmq,\
  git,ci/cd,rest,graphql,grpc,microservices,devops,agile,scrum,tdd,\
  machine learning,deep learning,llm,pytorch,tensorflow,hugging face,langchain,nlp,computer vision,\
  cybersecurity,devsecops,oauth,iam,siem,\
  prometheus,grafana,webpack
app.skills.alias.javascript=js,node,nodejs
app.skills.alias.typescript=ts
app.skills.alias.kubernetes=k8s
app.skills.alias.postgresql=postgres
app.skills.alias.cicd=ci cd,ci-cd,continuous integration,continuous delivery
app.skills.alias.csharp=c#,.net,dotnet
app.skills.alias.go=golang
app.skills.alias.c++=cpp,c plus plus
app.skills.alias.gcp=google cloud,google cloud platform
app.skills.alias.machine learning=ml
app.skills.alias.deep learning=dl
app.skills.alias.llm=large language model,generative ai,gen ai,genai
app.skills.alias.cybersecurity=cyber security,information security,infosec,appsec
app.skills.alias.hugging face=huggingface
app.skills.alias.elasticsearch=elastic,opensearch
app.skills.alias.react native=rn
app.skills.alias.grpc=grpc,gRPC
